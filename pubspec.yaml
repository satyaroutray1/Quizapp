name: quizsquare
description: A Flutter Quiz App.

version: 1.0.0+2

environment:
  sdk: ">=2.2.2 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  font_awesome_flutter: ^8.11.0
  http: ^0.12.2
  flutter_custom_clippers: ^1.1.2
  html_unescape: ^1.0.2
  auto_size_text: ^2.1.0
  circular_countdown_timer: ^0.1.0
  fluttertoast: ^7.1.8
  syncfusion_flutter_gauges: ^18.4.43
  double_back_to_close_app: ^2.0.1
  loading_animations: ^2.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter


flutter:
  uses-material-design: true

  assets:
    - assets/images/

module:
  androidX: true # Add this line.
