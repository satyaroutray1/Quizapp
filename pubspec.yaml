name: quizsquare
description: A Flutter Quiz App.

version: 1.0.0+3

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  font_awesome_flutter: ^11.0.0
  http: ^1.6.0
  flutter_custom_clippers: ^2.1.0
  html_unescape: ^2.0.0
  auto_size_text: ^3.0.0
  circular_countdown_timer: ^0.2.4
  fluttertoast: ^9.0.0
  syncfusion_flutter_gauges: ^33.2.6
  double_back_to_close_app: ^2.1.0
  loading_animations: ^2.2.0
  change_app_package_name: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter


flutter:
  uses-material-design: true

  assets:
    - assets/images/

module:
  androidX: true # Add this line.
